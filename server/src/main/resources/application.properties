server.port=8080

# Server runtime data directory (users / jwt key / server key)
syncclipboard.data-dir=data
syncclipboard.users-file=${syncclipboard.data-dir}/users.properties

# Server key (legacy v1 auth). Override with env SYNC_SERVER_KEY in production.
# When empty, server generates a random key on first start at ${data-dir}/server-key (chmod 600).
syncclipboard.server-key=${SYNC_SERVER_KEY:}

# WebSocket allowed origin patterns (comma separated). Default: same-origin only.
syncclipboard.allowed-origins=

# File transfer P2P settings
syncclipboard.max-relay-size=307200
syncclipboard.udp-port=8081

# File transfer level: 0=off, 1=LAN only, 2=LAN+NAT, 3=LAN+NAT+relay(full)
syncclipboard.file-transfer-level=2

# Login rate limit (per username+ip combo)
syncclipboard.login.max-attempts=5
syncclipboard.login.window-seconds=60

# Logging
logging.level.com.syncclipboard=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{20} - %msg%n

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
