# SyncClipboard Windows Client Configuration

# Server connection
server_host = 127.0.0.1
server_port = 8080
server_path = /ws/clipboard

# Server authentication key
server_key = my-secret-server-key

# User credentials
username = admin
password = admin123

# AES-256 encryption key (64 hex chars = 32 bytes)
aes_key = 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

# Device identifier
device_id = windows-device-01

file_transfer_level = 3
max_transfer_size = 500
